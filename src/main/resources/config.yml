# --- block configuration ---

# The block material you want to use as a trampoline.
# Make sure to use uppercase letters (e.g. SLIME_BLOCK, SPONGE)
block: SLIME_BLOCK

# How high should the player fly? (Velocity multiplier)
velocity-multiplier: 2.0

# How many ticks should the player be protected from fall damage after bouncing?
# (20 ticks = 1 second, so 50 ticks = 2,5 seconds)
no-damage-ticks: 0


# --- update checker configuration ---

update-checker:
  # Enable/disable the update checker
  enabled: true
  # How should update notifications be displayed?
  # Options: "console", "player" or "both"
  notify-method: both


# --- prefix configuration ---

prefix: "&7[&cBBB&7] " # Don't forget the space at the end!


# --- message configuration ---

messages:
  no-permission: "&cYou do not have permission to use this command!"
  reload-success: "&aBetter Bouncy Blocks reloaded successfully!"
  command-usage: "&cUsage: &7/&cbbb reload"
